<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Abdulrahman Hussein &middot; Full-Stack Web Developer</title>
    <meta name="description" content="Abdulrahman Hussein - Web Developer building clean, modern, and performant web applications." />
    <meta property="og:title" content="Abdulrahman Hussein - Web Developer" />
    <meta property="og:description" content="Web Developer building clean, modern, and performant web applications." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Optimized Eye-friendly Dark Palette */
            --bg: #07090e;
            --bg-card: rgba(15, 23, 42, 0.88);
            --bg-card-hover: rgba(24, 35, 54, 0.92);
            --border-card: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(56, 189, 248, 0.35);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-cyan: #38bdf8;
            --accent-emerald: #10b981;
            --accent-purple: #818cf8;
            
            --glow-cyan: rgba(56, 189, 248, 0.12);

            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 9999px;

            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        ::selection {
            background: rgba(56, 189, 248, 0.2);
            color: #ffffff;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--bg);
            color: var(--text-primary);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(32px, 6vw, 64px) clamp(16px, 4vw, 24px) 32px;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Optimized Hardware-Accelerated Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.85;
            transform: translateZ(0);
            will-change: transform;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Status Badge */
        .status-badge {
            align-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.22);
            border-radius: var(--radius-full);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: #34d399;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            animation: fadeIn 0.8s var(--ease-out);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
            animation: pulseDot 2.2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.85); }
        }

        /* Profile Window */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 28px 24px 24px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: riseUp 0.7s var(--ease-out) both;
            transform-style: preserve-3d;
            will-change: transform;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Terminal Window Header */
        .terminal-header {
            position: absolute;
            top: 14px;
            left: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .term-btn {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .term-close { background: #f87171; opacity: 0.75; }
        .term-min { background: #fbbf24; opacity: 0.75; }
        .term-max { background: #34d399; opacity: 0.75; }

        .term-title {
            position: absolute;
            top: 10px;
            right: 18px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* Avatar */
        .avatar-container {
            position: relative;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .avatar-glow {
            position: absolute;
            inset: -4px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.35), rgba(129, 140, 248, 0.35), rgba(52, 211, 153, 0.35));
            opacity: 0.45;
            filter: blur(10px);
            transition: opacity 0.3s var(--ease-out);
        }

        .avatar-wrap {
            position: relative;
            width: 94px;
            height: 94px;
            border-radius: var(--radius-full);
            background: #1e293b;
            border: 2px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            display: block;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s var(--ease-out);
        }

        .profile-card:hover .avatar-glow {
            opacity: 0.75;
            filter: blur(12px);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: 12px;
        }

        /* Profile Text */
        .name {
            font-size: 1.55rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verified-icon {
            width: 18px;
            height: 18px;
            fill: var(--accent-cyan);
        }

        /* Typing Terminal Bio */
        .bio-terminal {
            font-family: var(--font-mono);
            font-size: 0.86rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            padding: 8px 14px;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
        }

        .bio-prefix {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .bio-text {
            color: var(--text-primary);
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 15px;
            background: var(--accent-cyan);
            vertical-align: middle;
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Tech Stack Badges */
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
        }

        .tech-pill {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: var(--text-secondary);
            transition: transform 0.2s var(--ease-out), background 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
            cursor: default;
        }

        .tech-pill:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
            color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        /* Links List */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-primary);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            transition: transform 0.25s var(--ease-out), border-color 0.25s var(--ease-out), background 0.25s var(--ease-out);
            animation: riseUp 0.6s var(--ease-out) both;
            animation-delay: calc(var(--i, 0) * 0.06s + 0.15s);
            will-change: transform;
            -webkit-tap-highlight-color: transparent;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            background: var(--bg-card-hover);
        }

        .link-card:active {
            transform: translateY(0);
        }

        .link-num {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            width: 22px;
            flex-shrink: 0;
        }

        .link-icon-box {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg, rgba(255, 255, 255, 0.05));
            color: var(--icon-fg, var(--text-primary));
            flex-shrink: 0;
            transition: transform 0.25s var(--ease-out);
        }

        .link-icon-box svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .link-card:hover .link-icon-box {
            transform: scale(1.06);
        }

        .link-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .link-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f8fafc;
            line-height: 1.3;
        }

        .link-sub {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .copy-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            z-index: 2;
        }

        .copy-btn:hover {
            background: rgba(56, 189, 248, 0.12);
            border-color: rgba(56, 189, 248, 0.35);
            color: var(--accent-cyan);
            transform: scale(1.06);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .copy-btn svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .arrow-icon {
            color: var(--text-muted);
            transition: transform 0.25s var(--ease-out), color 0.25s var(--ease-out);
        }

        .link-card:hover .arrow-icon {
            transform: translateX(4px);
            color: var(--accent-cyan);
        }

        .arrow-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .footer-line {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-heart {
            color: #f87171;
            display: inline-block;
            animation: pulseHeart 1.8s infinite;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: #1e293b;
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-out);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Keyframes */
        @keyframes riseUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            #bg-canvas { display: none; }
        }

        @media (max-width: 480px) {
            .page { gap: 22px; }
            .profile-card { padding: 24px 18px 20px; }
            .avatar-wrap { width: 84px; height: 84px; }
            .name { font-size: 1.4rem; }
            .link-card { padding: 14px 16px; gap: 12px; }
            .link-icon-box { width: 38px; height: 38px; }
            .link-num { display: none; }
        }
    </style>
</head>

                icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>'
            },
            {
                label: 'Instagram',
                sub: '@lllsfe',
                url: 'https://www.instagram.com/lllsfe',
                fg: '#f472b6',
                bg: 'rgba(244, 114, 182, 0.1)',
                icon: '<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069M12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324M12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8m6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>'
            }
        ];

        // Populate Year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Render Link Cards
        var linksContainer = document.getElementById('links');
        var copyIconSVG = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        var checkIconSVG = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
        var arrowIconSVG = '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

        LINKS.forEach(function(link, idx) {
            var numStr = (idx + 1 < 10 ? '0' : '') + (idx + 1) + '.';
            var card = document.createElement('a');
            card.className = 'link-card';
            card.href = link.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.style.setProperty('--i', String(idx));
            card.style.setProperty('--icon-fg', link.fg);
            card.style.setProperty('--icon-bg', link.bg);

            card.innerHTML = 
                '<span class="link-num">' + numStr + '</span>' +
                '<span class="link-icon-box">' + link.icon + '</span>' +
                '<div class="link-details">' +
                    '<span class="link-title">' + link.label + '</span>' +
                    '<span class="link-sub">' + link.sub + '</span>' +
                '</div>' +
                '<div class="link-actions">' +
                    '<button class="copy-btn" data-url="' + link.url + '" title="Copy link" aria-label="Copy ' + link.label + ' link">' +
                        copyIconSVG +
                    '</button>' +
                    '<span class="arrow-icon">' + arrowIconSVG + '</span>' +
                '</div>';

            linksContainer.appendChild(card);
        });

        // Copy Button Handler
        var toast = document.getElementById('toast');
        var toastTimeout;

        document.querySelectorAll('.copy-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var url = this.getAttribute('data-url');
                var self = this;

                navigator.clipboard.writeText(url).then(function() {
                    self.innerHTML = checkIconSVG;
                    self.classList.add('copied');
                    
                    toast.classList.add('show');
                    clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(function() {
                        toast.classList.remove('show');
                    }, 2200);

                    setTimeout(function() {
                        self.innerHTML = copyIconSVG;
                        self.classList.remove('copied');
                    }, 1800);
                });
            });
        });

        // Bio Typing Loop
        var phrases = ['"Web Developer"', '"Full-Stack Creator"', '"Code Architect"', '"UI/UX Enthusiast"'];
        var phraseIndex = 0;
        var charIndex = 0;
        var isDeleting = false;
        var typingBioEl = document.getElementById('typingBio');

        function typeLoop() {
            var currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                typingBioEl.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingBioEl.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            var typeSpeed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 400;
            }

            setTimeout(typeLoop, typeSpeed);
        }

        document.addEventListener('DOMContentLoaded', function() {
            typeLoop();
        });

        // -----------------------------------------------------------
        // ULTRA-LIGHTWEIGHT OPTIMIZED GALAXY WEBGL SHADER
        // -----------------------------------------------------------
        (function initGalaxy() {
            var canvas = document.getElementById('bg-canvas');
            if (!canvas) return;

            var gl = canvas.getContext('webgl', { 
                alpha: true, 
                premultipliedAlpha: false,
                antialias: false,
                depth: false,
                preserveDrawingBuffer: false
            });
            if (!gl) return;

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            gl.clearColor(0, 0, 0, 0);

            var vertexShaderSource = `
                attribute vec2 position;
                attribute vec2 uv;
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 0.0, 1.0);
                }
            `;

            /* Optimized GLSL Fragment Shader: NUM_LAYER reduced from 4.0 to 2.0 for 50% GPU speedup */
            var fragmentShaderSource = `
                precision mediump float;

                uniform float uTime;
                uniform vec3 uResolution;
                uniform vec2 uFocal;
                uniform vec2 uRotation;
                uniform float uStarSpeed;
                uniform float uDensity;
                uniform float uHueShift;
                uniform float uSpeed;
                uniform vec2 uMouse;
                uniform float uGlowIntensity;
                uniform float uSaturation;
                uniform bool uMouseRepulsion;
                uniform float uTwinkleIntensity;
                uniform float uRotationSpeed;
                uniform float uRepulsionStrength;
                uniform float uMouseActiveFactor;
                uniform float uAutoCenterRepulsion;
                uniform bool uTransparent;

                varying vec2 vUv;

                #define NUM_LAYER 2.0
                #define STAR_COLOR_CUTOFF 0.2
                #define MAT45 mat2(0.7071, -0.7071, 0.7071, 0.7071)
                #define PERIOD 3.0

                float Hash21(vec2 p) {
                  p = fract(p * vec2(123.34, 456.21));
                  p += dot(p, p + 45.32);
                  return fract(p.x * p.y);
                }

                float tri(float x) {
                  return abs(fract(x) * 2.0 - 1.0);
                }

                float tris(float x) {
                  float t = fract(x);
                  return 1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0));
                }

                float trisn(float x) {
                  float t = fract(x);
                  return 2.0 * (1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0))) - 1.0;
                }

                vec3 hsv2rgb(vec3 c) {
                  vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                }

                float Star(vec2 uv, float flare) {
                  float d = length(uv);
                  float m = (0.05 * uGlowIntensity) / d;
                  float rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));
                  m += rays * flare * uGlowIntensity;
                  uv *= MAT45;
                  rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));
                  m += rays * 0.3 * flare * uGlowIntensity;
                  m *= smoothstep(1.0, 0.2, d);
                  return m;
                }

                vec3 StarLayer(vec2 uv) {
                  vec3 col = vec3(0.0);

                  vec2 gv = fract(uv) - 0.5; 
                  vec2 id = floor(uv);

                  for (int y = -1; y <= 1; y++) {
                    for (int x = -1; x <= 1; x++) {
                      vec2 offset = vec2(float(x), float(y));
                      vec2 si = id + offset;
                      float seed = Hash21(si);
                      float size = fract(seed * 345.32);
                      float glossLocal = tri(uStarSpeed / (PERIOD * seed + 1.0));
                      float flareSize = smoothstep(0.9, 1.0, size) * glossLocal;

                      float red = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 1.0)) + STAR_COLOR_CUTOFF;
                      float blu = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 3.0)) + STAR_COLOR_CUTOFF;
                      float grn = min(red, blu) * seed;
                      vec3 base = vec3(red, grn, blu);
                      
                      float hue = atan(base.g - base.r, base.b - base.r) / 6.28318 + 0.5;
                      hue = fract(hue + uHueShift / 360.0);
                      float sat = length(base - vec3(dot(base, vec3(0.299, 0.587, 0.114)))) * uSaturation;
                      float val = max(max(base.r, base.g), base.b);
                      base = hsv2rgb(vec3(hue, sat, val));

                      vec2 pad = vec2(tris(seed * 34.0 + uTime * uSpeed / 10.0), tris(seed * 38.0 + uTime * uSpeed / 30.0)) - 0.5;

                      float star = Star(gv - offset - pad, flareSize);
                      vec3 color = base;

                      float twinkle = trisn(uTime * uSpeed + seed * 6.2831) * 0.5 + 1.0;
                      twinkle = mix(1.0, twinkle, uTwinkleIntensity);
                      star *= twinkle;
                      
                      col += star * size * color;
                    }
                  }

                  return col;
                }

                void main() {
                  vec2 focalPx = uFocal * uResolution.xy;
                  vec2 uv = (vUv * uResolution.xy - focalPx) / uResolution.y;

                  if (uMouseRepulsion) {
                    vec2 mousePosUV = (uMouse * uResolution.xy - focalPx) / uResolution.y;
                    float mouseDist = length(uv - mousePosUV);
                    vec2 repulsion = normalize(uv - mousePosUV) * (uRepulsionStrength / (mouseDist + 0.1));
                    uv += repulsion * 0.05 * uMouseActiveFactor;
                  }

                  float autoRotAngle = uTime * uRotationSpeed;
                  mat2 autoRot = mat2(cos(autoRotAngle), -sin(autoRotAngle), sin(autoRotAngle), cos(autoRotAngle));
                  uv = autoRot * uv;

                  vec3 col = vec3(0.0);

                  for (float i = 0.0; i < 1.0; i += 1.0 / NUM_LAYER) {
                    float depth = fract(i + uStarSpeed * uSpeed);
                    float scale = mix(16.0 * uDensity, 0.5 * uDensity, depth);
                    float fade = depth * smoothstep(1.0, 0.9, depth);
                    col += StarLayer(uv * scale + i * 453.32) * fade;
                  }

                  if (uTransparent) {
                    float alpha = smoothstep(0.0, 0.3, length(col));
                    gl_FragColor = vec4(col, min(alpha, 1.0));
                  } else {
                    gl_FragColor = vec4(col, 1.0);
                  }
                }
            `;

            function createShader(gl, type, source) {
                var shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    gl.deleteShader(shader);
                    return null;
                }
                return shader;
            }

            var vertShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
            var fragShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
            if (!vertShader || !fragShader) return;

            var program = gl.createProgram();
            gl.attachShader(program, vertShader);
            gl.attachShader(program, fragShader);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) return;

            gl.useProgram(program);

            var positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                -1, -1, 0, 0,
                 3, -1, 2, 0,
                -1,  3, 0, 2
            ]), gl.STATIC_DRAW);

            var posLoc = gl.getAttribLocation(program, 'position');
            var uvLoc = gl.getAttribLocation(program, 'uv');

            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 16, 0);
            if (uvLoc !== -1) {
                gl.enableVertexAttribArray(uvLoc);
                gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, 16, 8);
            }

            // Uniform Locations
            var uTimeLoc = gl.getUniformLocation(program, 'uTime');
            var uResolutionLoc = gl.getUniformLocation(program, 'uResolution');
            var uFocalLoc = gl.getUniformLocation(program, 'uFocal');
            var uRotationLoc = gl.getUniformLocation(program, 'uRotation');
            var uStarSpeedLoc = gl.getUniformLocation(program, 'uStarSpeed');
            var uDensityLoc = gl.getUniformLocation(program, 'uDensity');
            var uHueShiftLoc = gl.getUniformLocation(program, 'uHueShift');
            var uSpeedLoc = gl.getUniformLocation(program, 'uSpeed');
            var uMouseLoc = gl.getUniformLocation(program, 'uMouse');
            var uGlowIntensityLoc = gl.getUniformLocation(program, 'uGlowIntensity');
            var uSaturationLoc = gl.getUniformLocation(program, 'uSaturation');
            var uMouseRepulsionLoc = gl.getUniformLocation(program, 'uMouseRepulsion');
            var uTwinkleIntensityLoc = gl.getUniformLocation(program, 'uTwinkleIntensity');
            var uRotationSpeedLoc = gl.getUniformLocation(program, 'uRotationSpeed');
            var uRepulsionStrengthLoc = gl.getUniformLocation(program, 'uRepulsionStrength');
            var uMouseActiveFactorLoc = gl.getUniformLocation(program, 'uMouseActiveFactor');
            var uAutoCenterRepulsionLoc = gl.getUniformLocation(program, 'uAutoCenterRepulsion');
            var uTransparentLoc = gl.getUniformLocation(program, 'uTransparent');

            // High Performance Properties
            var props = {
                focal: [0.5, 0.5],
                rotation: [1.0, 0.0],
                starSpeed: 0.3,
                density: 0.95,
                hueShift: 210,
                speed: 0.7,
                glowIntensity: 0.22,
                saturation: 0.3,
                mouseRepulsion: true,
                twinkleIntensity: 0.2,
                rotationSpeed: 0.05,
                repulsionStrength: 1.6,
                autoCenterRepulsion: 0.0,
                transparent: true
            };

            var targetMousePos = { x: 0.5, y: 0.5 };
            var smoothMousePos = { x: 0.5, y: 0.5 };
            var targetMouseActive = 0.0;
            var smoothMouseActive = 0.0;

            // Pixel Downscaling for 60fps Fill Rate Optimization
            function resize() {
                var dpr = Math.min(window.devicePixelRatio || 1, 1.25);
                var renderScale = 0.75; // Render at 75% resolution & CSS stretch for 4x GPU fillrate gain
                var w = Math.floor(window.innerWidth * dpr * renderScale);
                var h = Math.floor(window.innerHeight * dpr * renderScale);
                
                canvas.width = w;
                canvas.height = h;
                gl.viewport(0, 0, w, h);
                gl.uniform3f(uResolutionLoc, w, h, w / h);
            }

            var resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resize, 100);
            });
            resize();

            window.addEventListener('mousemove', function(e) {
                targetMousePos.x = e.clientX / window.innerWidth;
                targetMousePos.y = 1.0 - (e.clientY / window.innerHeight);
                targetMouseActive = 1.0;
            }, { passive: true });

            window.addEventListener('mouseleave', function() {
                targetMouseActive = 0.0;
            }, { passive: true });

            // Render loop with tab visibility pause
            function render(t) {
                requestAnimationFrame(render);
                if (document.hidden) return; // Pause GPU rendering when tab is not active

                var timeSec = t * 0.001;
                gl.uniform1f(uTimeLoc, timeSec);
                gl.uniform1f(uStarSpeedLoc, (timeSec * props.starSpeed) / 10.0);

                var lerp = 0.05;
                smoothMousePos.x += (targetMousePos.x - smoothMousePos.x) * lerp;
                smoothMousePos.y += (targetMousePos.y - smoothMousePos.y) * lerp;
                smoothMouseActive += (targetMouseActive - smoothMouseActive) * lerp;

                gl.uniform2f(uFocalLoc, props.focal[0], props.focal[1]);
                gl.uniform2f(uRotationLoc, props.rotation[0], props.rotation[1]);
                gl.uniform1f(uDensityLoc, props.density);
                gl.uniform1f(uHueShiftLoc, props.hueShift);
                gl.uniform1f(uSpeedLoc, props.speed);
                gl.uniform2f(uMouseLoc, smoothMousePos.x, smoothMousePos.y);
                gl.uniform1f(uGlowIntensityLoc, props.glowIntensity);
                gl.uniform1f(uSaturationLoc, props.saturation);
                gl.uniform1i(uMouseRepulsionLoc, props.mouseRepulsion ? 1 : 0);
                gl.uniform1f(uTwinkleIntensityLoc, props.twinkleIntensity);
                gl.uniform1f(uRotationSpeedLoc, props.rotationSpeed);
                gl.uniform1f(uRepulsionStrengthLoc, props.repulsionStrength);
                gl.uniform1f(uMouseActiveFactorLoc, smoothMouseActive);
                gl.uniform1f(uAutoCenterRepulsionLoc, props.autoCenterRepulsion);
                gl.uniform1i(uTransparentLoc, props.transparent ? 1 : 0);

                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.drawArrays(gl.TRIANGLES, 0, 3);
            }

            requestAnimationFrame(render);
        })();

        // Optimized 3D Magnetic Card Tilt Effect
        var profileCard = document.getElementById('profileCard');
        var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!prefersReducedMotion && profileCard) {
            var ticking = false;
            var targetX = 0, targetY = 0;
            var currX = 0, currY = 0;

            profileCard.addEventListener('mousemove', function(e) {
                var rect = profileCard.getBoundingClientRect();
                var cx = rect.left + rect.width / 2;
                var cy = rect.top + rect.height / 2;
                var dx = (e.clientX - cx) / (rect.width / 2);
                var dy = (e.clientY - cy) / (rect.height / 2);
                targetX = -dy * 5;
                targetY = dx * 5;

                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(updateTilt);
                }
            }, { passive: true });

            profileCard.addEventListener('mouseleave', function() {
                targetX = 0;
                targetY = 0;
                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(updateTilt);
                }
            }, { passive: true });

            function updateTilt() {
                currX += (targetX - currX) * 0.1;
                currY += (targetY - currY) * 0.1;
                if (Math.abs(currX - targetX) < 0.01 && Math.abs(currY - targetY) < 0.01) {
                    currX = targetX;
                    currY = targetY;
                    ticking = false;
                }
                profileCard.style.transform = 'perspective(1000px) rotateX(' + currX + 'deg) rotateY(' + currY + 'deg)';
                if (ticking) {
                    requestAnimationFrame(updateTilt);
                }
            }
        }
