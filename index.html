        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #E6E7DA;
            --avatar-bg: #d4d5c9;
            --text: #1a1a1a;
            --text-muted: #555555;
            --link-border: #c8c9bd;
            --link-hover: rgba(0, 0, 0, 0.05);
            --accent-cool: #2563eb;
            --glow: rgba(0, 0, 0, 0.06);
            --radius: 14px;
            --radius-full: 50%;
            --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-display: 'DM Serif Display', var(--font);
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 32px;
            --space-xl: 48px;
            --space-2xl: clamp(32px, 5vw, 56px);
        }
        ::selection {
            background: rgba(0, 0, 0, 0.15);
            color: var(--text);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: clamp(32px, 6vw, 64px) clamp(16px, 4vw, 24px) env(safe-area-inset-bottom);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: var(--space-2xl);
        }
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .profile {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
            animation: rise 0.6s var(--ease-out) both;
            perspective: 600px;
        }
        @keyframes settle {
            0% { transform: scale(1); }
            40% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        .avatar-wrap {
            display: block;
            width: 88px;
            height: 88px;
            border-radius: var(--radius-full);
            background: var(--avatar-bg);
            box-shadow: 0 0 0 1px oklch(0.75 0.03 100 / 0.4), 0 0 30px var(--glow);
            overflow: hidden;
            transition: transform 0.15s var(--ease-out), box-shadow 0.3s var(--ease-out);
            animation: settle 0.6s var(--ease-out) 0.8s both;
            transform-style: preserve-3d;
            will-change: transform;
        }
        .profile:hover .avatar-wrap {
            box-shadow: 0 0 0 1px oklch(0.75 0.03 100 / 0.4), 0 0 40px var(--glow);
        }
        .avatar {
            width: 100%;
            height: 100%;
            display: block;
            padding: 18px;
            object-fit: contain;
        }
        .profile-text {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }
        .name {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.3;
            color: var(--text);
            text-wrap: balance;
        }
        .bio {
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vw, 12px);
        }
        .link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.92rem;
            transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
            animation: rise 0.5s var(--ease-out) both;
            animation-delay: calc(var(--i, 0) * 0.04s);
            border: 2px solid #1a1a1a;
            background: #ffffff;
            box-shadow: 6px 6px 0 #1a1a1a;
            min-height: 56px;
            -webkit-tap-highlight-color: transparent;
        }
        .link:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 #1a1a1a;
        }
        .link:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 #1a1a1a;
        }
        .link-icon {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg, oklch(0.9 0.01 90));
            color: var(--icon-fg, var(--text-muted));
            transition: transform 0.25s var(--ease-out);
        }
        .link-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .link:hover .link-icon {
            transform: scale(1.1);
        }
        .link-label {
            flex: 1;
            text-align: center;
            padding-right: 0;
        }
        .link-copy {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            opacity: 0.4;
            border-radius: 6px;
            transition: opacity 0.2s var(--ease-out), background 0.2s var(--ease-out), color 0.2s var(--ease-out);
            cursor: pointer;
            z-index: 1;
        }
        .link-copy:hover {
            opacity: 1;
            color: var(--text);
        }
        .link-copy.copied {
            opacity: 1;
            color: #25d366;
        }
        .link-copy svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-out);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .link:focus-visible {
            outline: 2px solid var(--accent-cool);
            outline-offset: 3px;
        }
        .footer {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            animation: rise 0.6s var(--ease-out) 0.2s both;
            padding-top: var(--space-sm);
            padding-bottom: var(--space-xs);
        }
        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            position: relative;
        }
        .footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--accent-cool);
            transition: width 0.25s var(--ease-out), left 0.25s var(--ease-out);
        }
        .footer a:hover {
            color: var(--accent-cool);
        }
        .footer a:hover::after {
            width: 100%;
            left: 0;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: var(--space-sm);
        }
        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            color: #1C1D1D;
            transition: color 0.2s var(--ease-out), transform 0.2s var(--ease-out);
        }
        .social-icon:hover {
            color: #000000;
        }
        .social-icon svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }
        @media (max-width: 420px) {

            }

                width: 76px;
                height: 76px;
                animation-duration: 0.5s;
                animation-delay: 0.6s;
            }
            .avatar {
                padding: 16px;

            .name {
                font-size: 1.3rem;
            }
            .link {
                padding: 14px 16px;
                font-size: 0.88rem;
                min-height: 50px;
                gap: 12px;
            }
            .link-icon {
                width: 36px;
                height: 36px;
            }
            .link-icon svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>

        var copyIcon = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        var checkIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

        for (var i = 0; i < LINKS.length; i++) {
            var link = LINKS[i];
            var a = document.createElement('a');
            a.className = 'link';
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.setProperty('--icon-fg', link.fg);
            a.style.setProperty('--icon-bg', link.bg);
            a.style.setProperty('--i', String(i));
            a.innerHTML =
                '<span class="link-icon">' + link.icon + '</span>' +
                '<span class="link-label">' + link.label + '</span>' +
                '<span class="link-copy" data-url="' + link.url + '">' + copyIcon + '</span>';
            linksEl.appendChild(a);
        }

        var toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = 'Copied!';
        document.body.appendChild(toast);

        var toastTimeout;
        document.querySelectorAll('.link-copy').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var url = this.getAttribute('data-url');
                var self = this;
                navigator.clipboard.writeText(url).then(function() {
                    self.innerHTML = checkIcon;
                    self.classList.add('copied');
                    toast.classList.add('show');
                    clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(function() {
                        toast.classList.remove('show');
                    }, 1500);
                    setTimeout(function() {
                        self.innerHTML = copyIcon;
                        self.classList.remove('copied');
                    }, 1500);
                });
            });
        });

        var avatarWrap = document.querySelector('.avatar-wrap');
        var profile = document.querySelector('.profile');
        var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!prefersReducedMotion && avatarWrap) {
            var ticking = false;
            var targetRotateX = 0;
            var targetRotateY = 0;
            var currentRotateX = 0;
            var currentRotateY = 0;

            profile.addEventListener('mousemove', function(e) {
                var rect = avatarWrap.getBoundingClientRect();
                var centerX = rect.left + rect.width / 2;
                var centerY = rect.top + rect.height / 2;
                var distX = (e.clientX - centerX) / (rect.width / 2);
                var distY = (e.clientY - centerY) / (rect.height / 2);
                targetRotateX = -distY * 12;
                targetRotateY = distX * 12;
                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(updateAvatar);
                }
            });

            profile.addEventListener('mouseleave', function() {
                targetRotateX = 0;
                targetRotateY = 0;
                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(updateAvatar);
                }
            });

            function updateAvatar() {
                currentRotateX += (targetRotateX - currentRotateX) * 0.15;
                currentRotateY += (targetRotateY - currentRotateY) * 0.15;
                if (Math.abs(currentRotateX - targetRotateX) < 0.01 && Math.abs(currentRotateY - targetRotateY) < 0.01) {
                    currentRotateX = targetRotateX;
                    currentRotateY = targetRotateY;
                    ticking = false;
                }
                avatarWrap.style.transform = 'rotateX(' + currentRotateX + 'deg) rotateY(' + currentRotateY + 'deg) scale(1.04)';
                if (ticking) {
                    requestAnimationFrame(updateAvatar);
                }
            }
        }
    </script>
</body>
</html>
